environment: production
project_name: "Novel Studio"
debug: false

database:
  url: "sqlite:///./data/novel-engine.sqlite3"
  echo: false

api:
  host: "0.0.0.0"
  port: 8000
  workers: 1
  reload: false

security:
  secret_key: "${SECURITY_SECRET_KEY}"
  cors_origins: "http://localhost:8000,http://127.0.0.1:8000"

llm:
  provider: "mock"
  model: "studio-copilot-v1"

logging:
  level: "INFO"
  json_format: true
  console_output: true
  structured: true

monitoring:
  enabled: true
  metrics_enabled: false
  service_name: "novel-studio"
