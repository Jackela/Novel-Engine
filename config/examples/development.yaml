environment: development
project_name: "Novel Studio"
debug: true

database:
  url: "sqlite:///./data/novel-engine.sqlite3"
  echo: true

api:
  host: "127.0.0.1"
  port: 8000
  workers: 1
  reload: true

llm:
  provider: "mock"
  model: "studio-copilot-v1"

logging:
  level: "DEBUG"
  json_format: false
  console_output: true

monitoring:
  enabled: true
  metrics_enabled: false
  service_name: "novel-studio"
