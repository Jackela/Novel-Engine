# ========================================
# Novel Engine - Development Configuration
# ========================================

# Application settings
project_name: "Novel Engine (Development)"
debug: true

# Database configuration
database:
  url: "sqlite:///./data/dev_novel_engine.db"
  pool_size: 5
  max_overflow: 10
  pool_timeout: 30
  echo: true  # Enable SQL statement logging in development

# Redis configuration (optional for development)
redis:
  host: "localhost"
  port: 6379
  db: 1  # Use separate DB for development

# API configuration
api:
  host: "127.0.0.1"
  port: 8000
  workers: 1
  reload: true  # Enable auto-reload
  docs_url: "/docs"
  redoc_url: "/redoc"

# Security configuration
security:
  # Use a simple secret key for development (MUST be changed in production!)
  secret_key: "dev-secret-key-change-in-production-min-32-chars-long"
  access_token_expire_minutes: 60  # Longer expiration for development
  refresh_token_expire_days: 7
  cors_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"
    - "http://localhost:8080"
    - "http://localhost:5173"  # Vite default
  rate_limit: "1000/minute"  # Relaxed rate limit for development

# LLM configuration
llm:
  provider: "gemini"
  model: "gemini-pro"
  timeout: 60  # Longer timeout for debugging
  max_tokens: 4096
  temperature: 0.7
  top_p: 0.95
  top_k: 40
  retry_attempts: 3
  retry_delay: 1.0
  max_monthly_cost: 50.0  # Higher limit for development

# Logging configuration
logging:
  level: "DEBUG"
  format: "%(asctime)s - %(name)s - %(levelname)s - [%(filename)s:%(lineno)d] - %(message)s"
  json_format: false
  file_path: "./logs/development.log"
  max_bytes: 10485760  # 10MB
  backup_count: 5
  console_output: true
  structured: true

# Monitoring configuration
monitoring:
  enabled: true
  metrics_enabled: true
  metrics_port: 9090
  metrics_path: "/metrics"
  tracing_enabled: false  # Disable tracing in development for performance
  service_name: "novel-engine-dev"
