# CodeQL configuration file
# This configuration excludes known false positives and auto-generated files.

name: "Novel Engine CodeQL Configuration"

paths-ignore:
    # Auto-generated MSW service worker file (contains js/missing-origin-check)
    # This file is generated by MSW and explicitly says "Please do NOT modify this file"
    - "frontend/public/mockServiceWorker.js"
    # Auto-generated reports and build artifacts
    - "frontend/playwright-report/**"
    - "frontend/reports/**"
    - "frontend/dist/**"
    - "frontend/node_modules/**"
    # Test files - these often trigger false positives in security analysis
    - "tests/**"
    - "frontend/tests/**"
    - "characters/test/**"
    - "test-results/**"
    # Database migrations - auto-generated SQL
    - "migrations/**"
    # Virtual environments and dependencies
    - ".venv/**"
    - ".venv-ci/**"
    - "**/__pycache__/**"
    - "**/node_modules/**"
    # Coverage reports
    - "htmlcov/**"
    - "coverage.xml"
    - ".coverage"
    # Documentation
    - "docs/**"
    # Generated files
    - "frontend/src/components/ui/**"
    - "**/*.gen.ts"
    - "**/*.gen.js"
    # Files with mypy: ignore-errors - these are known type debt being addressed separately
    - "src/contexts/narratives/infrastructure/repositories/narrative_arc_repository.py"
    - "src/interactions/equipment/system.py"
    - "src/contexts/narratives/application/command_handlers/narrative_arc_command_handlers.py"
    - "src/infrastructure/state_store.py"
    - "src/performance/monitoring/performance_monitoring.py"

queries:
    - uses: security-extended
    - uses: security-and-quality

# Query filters for Python Protocol methods using ellipsis (...)
# These are valid Python idioms for typing.Protocol method bodies
query-filters:
    # Exclude ineffectual-statement for Protocol method bodies
    - exclude:
          tags contain:
              - "py/ineffectual-statement"
          path regexp: '.*/ports/.*\.py$'
    - exclude:
          tags contain:
              - "py/ineffectual-statement"
          path regexp: '.*/services/narrative_stream_service\.py$'
    - exclude:
          tags contain:
              - "py/ineffectual-statement"
          path regexp: '.*/generators/character_profile_generator\.py$'
    # Exclude common false positives in test files
    - exclude:
          id: py/unused-import
          path regexp: '.*/tests/.*\.py$'
    - exclude:
          id: js/unused-local-variable
          path regexp: '.*/tests/.*\.(ts|tsx|js|jsx)$'
    # Exclude pickle usage in internal caching (marked with nosec)
    - exclude:
          tags contain:
              - "py/insecure-deserialization"
          path regexp: '.*/(infrastructure|performance|performance_optimizations)/.*\.py$'
    # Exclude SHA1 usage where usedforsecurity=False is set
    - exclude:
          tags contain:
              - "py/weak-cryptographic-algorithm"
          path regexp: '.*/memory/semantic_memory\.py$'
    # Exclude false positive SQL injection in SQLAlchemy ORM usage
    - exclude:
          tags contain:
              - "py/sql-injection"
          path regexp: '.*/repositories/.*\.py$'
    # Exclude path traversal in routers with validation
    - exclude:
          tags contain:
              - "py/path-injection"
          path regexp: '.*/routers/(campaigns|characters)\.py$'
    # Exclude unused imports in contexts - often used by __init__.py exports
    - exclude:
          id: py/unused-import
          path regexp: '.*/contexts/.*\.py$'
    # Exclude import errors from known type-debt files
    - exclude:
          id: py/import-own-module
          path regexp: '.*/src/.*\.py$'
    # Exclude incomplete parity import warnings
    - exclude:
          tags contain:
              - "py/incomplete-parity-import"
          path regexp: '.*/src/.*\.py$'
