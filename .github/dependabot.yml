# Dependabot configuration for Novel Engine
# Documentation: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Python dependencies (pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps(python)"
      include: "scope"
    groups:
      # Group patch and minor updates to reduce PR noise
      patch-minor:
        update-types:
          - "patch"
          - "minor"
      # Major updates get their own PRs for careful review
    ignore:
      # Ignore patch updates for dev dependencies to reduce noise
      - dependency-name: "pytest*"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "black"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "isort"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "mypy"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "flake8"
        update-types: ["version-update:semver-patch"]

  # Node.js dependencies (frontend/package.json)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
      - "frontend"
    commit-message:
      prefix: "deps(frontend)"
      include: "scope"
    groups:
      # Group patch and minor updates
      patch-minor:
        update-types:
          - "patch"
          - "minor"
      # Group Radix UI updates together (they often release in batches)
      radix-ui:
        patterns:
          - "@radix-ui/*"
      # Group testing libraries
      testing:
        patterns:
          - "@testing-library/*"
          - "vitest*"
          - "@vitest/*"
          - "playwright*"
          - "@playwright/*"
    ignore:
      # Ignore patch updates for dev tooling
      - dependency-name: "@types/*"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "eslint*"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "prettier*"
        update-types: ["version-update:semver-patch"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "10:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
      - "ci/cd"
    commit-message:
      prefix: "deps(actions)"
      include: "scope"
    groups:
      # Group all action updates together (they're usually low-risk)
      actions:
        patterns:
          - "*"
