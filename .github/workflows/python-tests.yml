name: Python Tests

on:
  push:
    branches: [ main, develop, week1/** ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.12'
  MIN_COVERAGE: '50'

jobs:
  python-test-unit:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e . --verbose 2>&1 | tail -100

      - name: Run Unit Tests with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term \
            --cov-fail-under=${{ env.MIN_COVERAGE }} \
            --tb=short \
            --timeout=120 \
            -x \
            --ignore=tests/evaluation/ \
            --ignore=tests/contexts/character/infrastructure/adapters/ \
            --ignore=tests/contexts/knowledge/infrastructure/repositories/ \
            --ignore=tests/contexts/narrative/infrastructure/repositories/ \
            --ignore=tests/contexts/world/infrastructure/persistence/ \
            --ignore=tests/test_episodic_memory.py \
            --ignore=tests/test_layered_memory.py \
            --ignore=tests/test_semantic_memory.py \
            -q

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  python-quality:
    name: Python Quality Checks
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Run Ruff linter
        run: ruff check src/ tests/ --output-format=github

      - name: Run MyPy type checker
        run: mypy src/ --no-error-summary --show-column-numbers
        continue-on-error: true

      # - name: Check migrations
      #   run: |
      #     # Check if migrations are up to date
      #     alembic current
      #     alembic check
      #   continue-on-error: true
