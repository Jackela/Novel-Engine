name: DashScope Longform Gate

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      run_live:
        description: "Run external DashScope longform UAT after deterministic gate"
        required: true
        type: boolean
        default: false
      target_chapters:
        description: "Target chapter count for the live DashScope run"
        required: false
        default: "20"
      story_title_seed:
        description: "Story title prefix for the generated manuscript"
        required: false
        default: "DashScope PR Gate"

permissions:
  contents: read

concurrency:
  group: dashscope-longform-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dashscope-longform-gate:
    name: DashScope Longform Gate
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src
      ENABLE_DASHSCOPE_TESTS: "0"
      ENABLE_HONCHO_TESTS: "0"
      ENABLE_CHROMA_TESTS: "0"
      ENABLE_POSTGRES_TESTS: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Validate lockfile
        run: uv lock --check

      - name: Install backend dependencies
        run: uv sync --extra dev --extra test --frozen

      - name: Run deterministic narrative regression gate
        run: >
          uv run pytest -q
          tests/apps/api/test_workspaces.py
          tests/apps/cli/test_novel_engine.py
          tests/scripts/test_run_dashscope_longform_uat.py
          tests/contract/test_text_generation_provider_contract.py

      - name: Publish deterministic gate summary
        if: always()
        shell: bash
        run: |
          printf '%s\n' \
            "# DashScope Longform Gate (Deterministic)" \
            "- External-provider tests are disabled in pull request CI." \
            "- DashScope live UAT can be triggered manually with \`run_live=true\`." \
            >> "$GITHUB_STEP_SUMMARY"

  dashscope-longform-live-uat:
    name: DashScope Longform Live UAT
    if: github.event_name == 'workflow_dispatch' && (inputs.run_live == true || inputs.run_live == 'true')
    needs:
      - dashscope-longform-gate
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      DASHSCOPE_API_BASE: ${{ secrets.DASHSCOPE_API_BASE }}
      DASHSCOPE_MODEL: ${{ secrets.DASHSCOPE_MODEL }}
      DASHSCOPE_REVIEW_MODEL: ${{ secrets.DASHSCOPE_REVIEW_MODEL }}
      ENABLE_DASHSCOPE_TESTS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Validate lockfile
        run: uv lock --check

      - name: Install backend dependencies
        run: uv sync --extra dev --extra test --frozen

      - name: Run DashScope judge contracts
        run: >
          uv run pytest -q
          -m requires_dashscope
          tests/contract/test_text_generation_provider_contract.py

      - name: Run DashScope longform gate
        run: >
          uv run python scripts/uat/run_dashscope_longform_uat.py
          --target-chapters ${{ inputs.target_chapters || '20' }}
          --story-title-seed "${{ inputs.story_title_seed || 'DashScope PR Gate' }}"
          --output-dir "${{ runner.temp }}/dashscope-longform-gate"

      - name: Publish step summary
        if: always()
        shell: bash
        run: |
          report="${{ runner.temp }}/dashscope-longform-gate/LONGFORM_DASHSCOPE_LIVE_EVIDENCE.md"
          if [ -f "$report" ]; then
            cat "$report" >> "$GITHUB_STEP_SUMMARY"
          else
            printf '%s\n' "# DashScope 20-Chapter Live Evidence" "Report missing. The longform gate failed before evidence was written." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload longform gate evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dashscope-longform-gate
          path: |
            ${{ runner.temp }}/dashscope-longform-gate/LONGFORM_DASHSCOPE_LIVE_EVIDENCE.md
            ${{ runner.temp }}/dashscope-longform-gate/LONGFORM_DASHSCOPE_LIVE_EVIDENCE.json
