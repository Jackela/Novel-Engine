name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: Backend Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Validate lockfile
        run: uv lock --check

      - name: Install backend dependencies
        run: uv sync --extra dev --extra test --frozen

      - name: Run Ruff
        run: uv run ruff check src tests

      - name: Run import-linter
        run: uv run lint-imports

      - name: Run MyPy
        run: >
          uv run mypy
          src
          tests
          --no-error-summary
          --show-column-numbers

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src
      ENABLE_DASHSCOPE_TESTS: "0"
      ENABLE_HONCHO_TESTS: "0"
      ENABLE_CHROMA_TESTS: "0"
      ENABLE_POSTGRES_TESTS: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Validate lockfile
        run: uv lock --check

      - name: Install backend dependencies
        run: uv sync --extra dev --extra test --frozen

      - name: Run pytest
        run: uv run pytest -q

  frontend:
    name: Frontend Validation
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      APP_ENVIRONMENT: testing
      SECURITY_SECRET_KEY: test-secret-key-for-ci-contracts-1234567890
      MONITORING_METRICS_ENABLED: "false"
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Validate lockfile
        run: uv lock --check

      - name: Install backend dependencies
        working-directory: ${{ github.workspace }}
        run: uv sync --extra dev --extra test --frozen

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run TypeScript checks
        working-directory: frontend
        run: npm run type-check

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run frontend smoke tests
        working-directory: frontend
        run: npm run test:e2e:smoke

  postgres-live-smoke:
    name: PostgreSQL Live Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_novel_engine
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d test_novel_engine"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src
      ENABLE_POSTGRES_TESTS: "1"
      POSTGRES_TEST_URL: postgresql://postgres:postgres@localhost:5432/test_novel_engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Validate lockfile
        run: uv lock --check

      - name: Install backend dependencies
        run: uv sync --extra dev --extra test --frozen

      - name: Run PostgreSQL live smoke
        run: >
          uv run pytest -q
          -m postgres_integration
          tests/contexts/narrative/infrastructure/repositories

  chroma-live-smoke:
    name: Chroma Live Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      chroma:
        image: chromadb/chroma
        ports:
          - 8000:8000

    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src
      ENABLE_CHROMA_TESTS: "1"
      CHROMA_HOST: localhost
      CHROMA_PORT: "8000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Validate lockfile
        run: uv lock --check

      - name: Install backend dependencies
        run: uv sync --extra dev --extra test --frozen

      - name: Wait for Chroma
        run: |
          uv run python - <<'PY'
          import time
          from urllib.request import urlopen

          deadline = time.time() + 60
          last_error: Exception | None = None

          while time.time() < deadline:
              try:
                  with urlopen("http://localhost:8000/api/v2/heartbeat", timeout=5) as response:
                      if response.status == 200:
                          break
              except Exception as exc:  # pragma: no cover - CI readiness helper
                  last_error = exc
              time.sleep(2)
          else:
              raise SystemExit(f"Chroma did not become ready: {last_error}")
          PY

      - name: Run Chroma live smoke
        run: >
          uv run pytest -q
          -m requires_chroma
          tests/contexts/knowledge/infrastructure/vectorStores/test_chroma_vector_store_live.py
