name: Local Test Run

on: [workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      
      - name: Run Iron Laws tests
        run: |
          python -m pytest tests/test_iron_laws.py -v --tb=short
      
      - name: Run Foundation tests
        run: |
          python -m pytest tests/test_foundation.py -v --tb=short
      
      - name: Run Data Model tests
        run: |
          python -m pytest tests/test_data_models.py -v --tb=short
