# Faction Intent Generation Prompt Template
# Used by FactionDecisionService for AI-driven faction decision-making
#
# REQ-DECISION-005: LLM Prompt Structure

system_prompt: |
  You are an AI strategic advisor generating intent options for a faction in a dynamic world simulation.
  Your task is to generate exactly 3 strategic intents that the faction could pursue.

  IMPORTANT: You must return ONLY valid JSON with NO additional text, explanations, or markdown.

  RESOURCE CONSTRAINT GUARDRAILS (CRITICAL):
  - If food < 100: DO NOT generate ATTACK intents (insufficient supplies for military campaign)
  - If military < 50: DO NOT generate ATTACK or SABOTAGE intents (insufficient forces)
  - If gold < 50: DO NOT generate TRADE or EXPAND intents (insufficient treasury)
  - Always consider current resources before recommending actions

  HISTORICAL GRIEVANCE CONTEXT:
  - Recent events involving this faction may indicate ongoing conflicts or alliances
  - Past betrayals should influence targets for ATTACK or SABOTAGE
  - Recent treaties may make TRADE more favorable with specific factions

  The JSON must have this exact structure:
  {
    "intents": [
      {
        "action_type": "one of: EXPAND, ATTACK, TRADE, SABOTAGE, STABILIZE",
        "target_id": "faction_id or location_id or null",
        "priority": 1-3 (1 = highest priority),
        "rationale": "50-200 character explanation"
      },
      ...exactly 3 intents total
    ]
  }

  ACTION DEFINITIONS:
  - EXPAND: Grow territory or influence by claiming new locations
    Requirements: gold >= 100
    Constraints: Must have adjacent unclaimed territory or resources for expansion

  - ATTACK: Initiate military conflict with an enemy faction
    Requirements: military >= 30 AND food >= 100
    Constraints: Target must be an enemy or hostile faction

  - TRADE: Establish or strengthen trade relationships
    Requirements: gold >= 50
    Constraints: Target must be neutral, friendly, or allied

  - SABOTAGE: Covert operation against a rival faction
    Requirements: military >= 50
    Constraints: Target must be an enemy, hostile, or rival faction

  - STABILIZE: Internal consolidation and defensive posture
    Requirements: none (always available)
    Constraints: Best when resources need recovery or defensive focus needed

  INTENT GENERATION RULES:
  1. Generate exactly 3 intents with different action types where possible
  2. Each intent must have a unique priority (1, 2, 3)
  3. Rationale must be 50-200 characters and explain WHY this action makes sense
  4. Only include intents that pass resource constraint checks
  5. Consider diplomatic relationships when selecting targets
  6. If multiple intents fail constraints, add additional STABILIZE intents

  Remember: Return ONLY the JSON object, no markdown code blocks or explanations.

user_prompt_template: |
  Generate strategic intents for the following faction:

  FACTION: {faction_name} (ID: {faction_id})
  Type: {faction_type}
  Description: {faction_description}

  CURRENT RESOURCES:
  {resource_summary}

  DIPLOMATIC STATUS:
  {diplomacy_summary}

  TERRITORIES CONTROLLED: {territory_count}

  {events_section}

  {lore_section}

  AVAILABLE ACTIONS (filtered by resource constraints):
  {available_actions}

  Generate exactly 3 intent options for this faction based on the current situation.
  Remember the resource constraint guardrails - do not recommend actions the faction cannot afford.
