# Pre-commit hooks for Novel Engine
# See https://pre-commit.com for more information
#
# INSTALLATION:
#   pip install pre-commit
#   pre-commit install
#
# USAGE:
#   pre-commit run --all-files    # Run all hooks on all files
#   pre-commit run ruff           # Run specific hook
#
# ⚠️ CRITICAL: NO SKIPPING ALLOWED
#   All hooks MUST pass before commit
#
# TIMEOUT CONFIGURATION:
#   export PRE_COMMIT_TIMEOUT=600  # 10 minutes for large test suites

repos:
  # === 本地关键检查 (Local Critical Checks) ===
  - repo: local
    hooks:
      # 1. 依赖一致性检查 - 确保pyproject.toml和requirements.txt同步
      - id: check-requirements
        name: Check requirements consistency
        entry: python scripts/ci-check-requirements.py
        language: system
        pass_filenames: false
        files: ^(requirements.*\.txt|pyproject\.toml|uv\.lock)$
        description: Verifies that pyproject.toml and requirements.txt are consistent.

      # 2. 测试标记验证 - 确保所有测试有正确的金字塔标记
      - id: validate-test-markers
        name: Validate test pyramid markers
        entry: python scripts/testing/validate-test-markers.py
        language: system
        files: ^tests/.*test_.*\.py$
        pass_filenames: true
        verbose: true
        description: Ensures all test functions have proper pyramid markers.

      # 3. pytest smoke测试 - 快速验证核心功能
      - id: pytest-smoke
        name: Pytest smoke tests
        entry: python -m pytest tests/test_character_system_comprehensive.py tests/smoke/ -x -q --tb=line --maxfail=3
        language: system
        pass_filenames: false
        description: Quick smoke tests before commit.

  # === Python代码质量 (Python Code Quality) ===
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        description: Python linting with auto-fix
      - id: ruff-format
        description: Python code formatting

  # === 类型检查 (Type Checking) ===
  - repo: local
    hooks:
      - id: mypy
        name: MyPy type checking
        entry: mypy src/ --ignore-missing-imports --no-error-summary
        language: system
        pass_filenames: false
        files: ^src/.*\.py$
        description: Type checking - NO ERRORS ALLOWED

  # === 安全扫描 (Security Scanning) ===
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-ll"]
        description: Security vulnerability scanning

default_language_version:
  python: python3.12

# 增加超时时间 (10分钟用于大型测试套件)
# Increase timeout for large test suites
default_stages: [pre-commit, pre-push]
