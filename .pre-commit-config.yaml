# Pre-commit hooks for Novel Engine
# See https://pre-commit.com for more information
#
# INSTALLATION:
#   pip install pre-commit
#   pre-commit install
#   pre-commit install --hook-type pre-push
#
# USAGE:
#   pre-commit run --all-files    # Run all hooks on all files
#   pre-commit run ruff           # Run specific hook
#
# ⚠️ CRITICAL: NO SKIPPING ALLOWED - ZERO TOLERANCE POLICY
#   "不允许跳过任何检查" - No checks may be skipped under any circumstances
#
# TIMEOUT CONFIGURATION:
#   export PRE_COMMIT_TIMEOUT=600  # 10 minutes for large test suites
#
# ⚠️ LOCAL + CI CHECKS:
#   Most checks run both locally (pre-push) and in GitHub Actions:
#   - CodeQL Quick Check: Fast heuristic scan (local) + Full analysis (CI)
#   - Coverage Check: Local quick check + Full CI validation
#   - Full Integration/E2E Tests: CI only (requires environment setup)
#
#   Install CodeQL CLI for local security scanning:
#   https://github.com/github/codeql-cli-binaries

repos:
  # === PRE-COMMIT: Fast Checks (Every Commit) ===
  - repo: local
    hooks:
      # 1. Requirements Consistency
      - id: check-requirements
        name: ✅ Check requirements consistency
        entry: python scripts/ci-check-requirements.py
        language: system
        pass_filenames: false
        files: ^(requirements.*\.txt|pyproject\.toml|uv\.lock)$

      # 2. Test Markers Validation
      - id: validate-test-markers
        name: ✅ Validate test pyramid markers
        entry: python scripts/testing/validate-test-markers.py
        language: system
        files: ^tests/.*test_.*\.py$
        pass_filenames: true
        verbose: true

      # 3. Ruff Linting (Blocking)
      - id: ruff-check
        name: ✅ Ruff lint check (BLOCKING)
        entry: ruff check . --output-format=concise
        language: system
        pass_filenames: false
        files: ^.*\.py$

  # === PRE-PUSH: Comprehensive Checks (Blocking) ===
  - repo: local
    hooks:
      # 4. Syntax Check (Fast - catches import/SyntaxError before tests)
      - id: syntax-check
        name: 🔒 Syntax Check (BLOCKING - Fast)
        entry: python scripts/ci-syntax-check.py
        language: system
        pass_filenames: false
        stages: [pre-push]

      # 5. CodeQL Security Quick Check (Fast - local)
      - id: codeql-quick
        name: 🔒 CodeQL Quick Check (Fast - Local)
        entry: python scripts/ci-codeql-check.py
        language: system
        pass_filenames: false
        stages: [pre-push]

      # 6. Bandit Security (High Severity)
      - id: bandit-high
        name: 🔒 Bandit Security (High Severity - BLOCKING)
        entry: bandit -r src/ -ll
        language: system
        pass_filenames: false
        stages: [pre-push]

      # 6. Full Smoke Tests
      - id: pytest-smoke
        name: 🔒 Smoke Tests (BLOCKING)
        entry: python -m pytest tests/smoke/ -x -q --tb=line
        language: system
        pass_filenames: false
        stages: [pre-push]

      # 7. Core Unit Tests (matching CI)
      - id: pytest-unit
        name: 🔒 Core Unit Tests (BLOCKING)
        entry: python -m pytest tests/unit/api/ tests/unit/core/ tests/unit/contexts/ tests/contexts/ -x -q --tb=line --maxfail=5
        language: system
        pass_filenames: false
        stages: [pre-push]

      # 7b. Coverage Check (fast - checks core modules only)
      - id: pytest-coverage
        name: 🔒 Coverage Check (Fast - Core Modules)
        entry: python -m pytest tests/unit/core/ tests/unit/api/ --cov=src/core --cov=src/api --cov-fail-under=65 -q --no-cov-on-fail --cov-report=term-missing:skip-covered
        language: system
        pass_filenames: false
        stages: [pre-push]

      # 8. Quick Test Import Check (catches SyntaxError in all test files)
      - id: test-import-check
        name: 🔒 Test Import Check (Fast - catches SyntaxError)
        entry: python scripts/ci-test-import-check.py
        language: system
        pass_filenames: false
        stages: [pre-push]

      # 9. Frontend Type Check
      - id: frontend-type
        name: 🔒 Frontend Type Check (BLOCKING)
        entry: bash -c 'cd frontend && npm run typecheck'
        language: system
        pass_filenames: false
        stages: [pre-push]

      # 10. Frontend Unit Tests (matching CI)
      - id: frontend-unit
        name: 🔒 Frontend Unit Tests (BLOCKING)
        entry: bash -c 'cd frontend && npm run test:unit'
        language: system
        pass_filenames: false
        stages: [pre-push]

      # 11. MyPy (WARNING only - until we reach 0)
      - id: mypy-warning
        name: ⚠️  MyPy Type Check (WARNING - NOT BLOCKING)
        entry: python scripts/ci-mypy-warning.py
        language: system
        pass_filenames: false
        stages: [pre-push]
        verbose: true

  # === Formatting (Auto-fix) ===
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff-format
        description: Python code formatting

  # === Bandit (Pre-commit, informational) ===
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-ll"]
        stages: [pre-commit]

default_language_version:
  python: python3.12

# Fail fast - stop on first blocking failure
fail_fast: true

# Default stages - run on both pre-commit and pre-push
# Note: Hooks with explicit 'stages' will only run in those stages
default_stages: [pre-commit, pre-push]

# CI configuration - DO NOT SKIP hooks that are required for CI validation
# Removed: bandit-high, pytest-smoke, pytest-unit, frontend-type
# These hooks validate what CI checks - skipping them defeats the purpose!
ci:
  skip: [mypy-warning]  # Only skip non-blocking warning hooks
