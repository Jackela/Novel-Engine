minimum_pre_commit_version: "3.0.0"
fail_fast: true
default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: local
    hooks:
      - id: git-diff-cached-check
        name: git diff --cached --check
        entry: git diff --cached --check
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: ruff-check
        name: ruff check
        entry: uvx --from ruff==0.15.13 ruff check src tests
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: bandit-check
        name: bandit security check
        entry: uv run bandit -r src
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: mypy-check
        name: mypy type check
        entry: uv run mypy src
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: importlinter-check
        name: import linter
        entry: uv run lint-imports
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: uv-lock-check
        name: uv lock --check
        entry: uv lock --check
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: ssot
        name: SSOT alignment
        entry: uv run python scripts/qa/check_ssot.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: repo-hygiene
        name: repository hygiene
        entry: uv run python scripts/qa/check_repo_hygiene.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: openspec
        name: OpenSpec strict validation
        entry: corepack pnpm spec:validate
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: frontend-lint
        name: frontend lint
        entry: corepack pnpm --dir frontend lint
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: frontend-format-check
        name: frontend format check
        entry: corepack pnpm --dir frontend format:check
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: backend-pytest
        name: backend pytest
        entry: uv run pytest -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: openapi-snapshot
        name: OpenAPI snapshot
        entry: uv run python scripts/qa/check_openapi_snapshot.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: frontend-type-check
        name: frontend type-check
        entry: corepack pnpm --dir frontend type-check
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: frontend-test
        name: frontend test
        entry: corepack pnpm --dir frontend test:unit
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: frontend-build
        name: frontend build
        entry: corepack pnpm --dir frontend build
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
