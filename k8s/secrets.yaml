# Service Monitor Secret for Prometheus (if needed)
apiVersion: v1
kind: Secret
metadata:
  name: prometheus-auth
  namespace: novel-engine
  labels:
    app: monitoring
    component: prometheus
type: Opaque
stringData:
  username: "${PROMETHEUS_USERNAME}"
  password: "${PROMETHEUS_PASSWORD}"