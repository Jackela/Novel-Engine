# Kubernetes Secrets
# ==================
# NOTE: In production, these should be created using external secret management
# systems like HashiCorp Vault, AWS Secrets Manager, or Azure Key Vault
# DO NOT commit actual secrets to version control

apiVersion: v1
kind: Secret
metadata:
  name: novel-engine-secrets
  namespace: novel-engine
  labels:
    app: novel-engine
    component: secrets
type: Opaque
stringData:
  # Database credentials - REPLACE ENTIRELY with actual values from secret manager
  postgres_username: "${POSTGRES_USERNAME}"
  postgres_password: "${POSTGRES_PASSWORD}"
  postgres_url: "${POSTGRES_URL}"
  
  # Redis credentials - REPLACE ENTIRELY with actual values from secret manager
  redis_password: "${REDIS_PASSWORD}"
  redis_url: "${REDIS_URL}"
  
  # Application secrets - REPLACE ENTIRELY with actual values from secret manager
  encryption_key: "${ENCRYPTION_KEY}"
  jwt_secret: "${JWT_SECRET}"
  
  # AWS credentials for S3 - REPLACE ENTIRELY with actual values from secret manager
  aws_access_key_id: "${AWS_ACCESS_KEY_ID}"
  aws_secret_access_key: "${AWS_SECRET_ACCESS_KEY}"
  s3_bucket: "novel-engine-production"
  s3_region: "us-east-1"
  
  # LLM API keys - REPLACE ENTIRELY with actual values from secret manager
  openai_api_key: "${OPENAI_API_KEY}"
  anthropic_api_key: "${ANTHROPIC_API_KEY}"
  google_api_key: "${GOOGLE_API_KEY}"
  
  # Monitoring and observability
  jaeger_endpoint: "http://jaeger-collector:14268/api/traces"
  prometheus_pushgateway: "http://prometheus-pushgateway:9091"

---

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: novel-engine
  labels:
    app: postgres
    component: secrets
type: Opaque
stringData:
  postgres_user: "${POSTGRES_ADMIN_USER}"
  postgres_password: "${POSTGRES_ADMIN_PASSWORD}"
  postgres_db: "novelengine"

---

apiVersion: v1
kind: Secret
metadata:
  name: redis-secrets
  namespace: novel-engine
  labels:
    app: redis
    component: secrets
type: Opaque
stringData:
  redis_password: "${REDIS_PASSWORD}"

---

# TLS Certificate Secret (replace with cert-manager or external certificate)
apiVersion: v1
kind: Secret
metadata:
  name: novel-engine-tls
  namespace: novel-engine
  labels:
    app: novel-engine
    component: tls
type: kubernetes.io/tls
data:
  # Base64 encoded certificate and key
  # In production, use cert-manager with Let's Encrypt or your CA
  tls.crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCi4uLiBZT1VSIENFUlRJRklDQVRFIERBVEEgSEVSRSAuLi4KLS0tLS1FTkQgQ0VSVElGSUNBVEUtLS0tLQ==
